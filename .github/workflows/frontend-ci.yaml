name: Frontend CI

on:
  push:
    branches: [ main ]
    paths:
      - 'frontend/**'               
      - '.github/workflows/frontend-ci.yaml' 
  pull_request:
    branches: [ main ]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yaml'

  workflow_dispatch:

jobs:
  frontend:
    name: Lint, Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci
        working-directory: frontend

      - name: Run Linter
        run: npm run lint
        working-directory: frontend

      - name: Run Tests
        run: npm run test
        working-directory: frontend

      - name: Build Application
        run: npm run build
        working-directory: frontend
