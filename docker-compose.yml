version: '3.8'

services:
  # 1. Database Service
  db:
    image: postgres:15-alpine
    container_name: pipeline_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - pipeline_network

  # # 2. Backend Service (FastAPI API)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pipeline_backend
    ports:
      - "8000:8000"
    environment:
      # Connects using the service name 'db' as the hostname
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      - db
    networks:
      - pipeline_network

  # # 3. Frontend Service (Vite + Non-Root Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pipeline_frontend
    ports:
      - "8081:8080" 
    depends_on:
      - backend
    networks:
      - pipeline_network

volumes:
  postgres_data:

networks:
  pipeline_network:
    driver: bridge